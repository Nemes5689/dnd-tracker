name: Deploy to GitHub Pages
 
on:
  push:
    branches: [main]
  workflow_dispatch:
 
permissions:
  contents: read
  pages: write
  id-token: write
 
concurrency:
  group: pages
  cancel-in-progress: true
 
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Critical: force devDependencies to install (where vite, tsc, etc. live).
      # Some CI runners default NODE_ENV=production which would skip them.
      NODE_ENV: development
      # Skip Electron's huge binary download (we don't need it for web build)
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      HUSKY: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
 
      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps --include=dev --ignore-scripts
 
      - name: Verify vite is installed (debug)
        run: |
          ls node_modules/.bin/vite || echo "vite NOT found"
          npx vite --version || echo "npx cannot run vite"
 
      - name: Build (web)
        run: npm run build
 
      - name: Setup Pages
        uses: actions/configure-pages@v5
 
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
 
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

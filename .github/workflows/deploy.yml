name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Skip Electron's postinstall download (we don't need Electron for web build)
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      # Avoid postinstall scripts hanging on CI
      CI: 'true'
      # Skip Husky etc.
      HUSKY: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Use npm install (not npm ci) so a slightly stale lockfile doesn't break the build.
      # --ignore-scripts skips electron's binary download which is huge and not needed for web.
      - name: Install dependencies
        run: npm install --no-audit --no-fund --ignore-scripts --legacy-peer-deps

      - name: Build (web)
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
